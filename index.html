<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>寶可夢食材模擬器</title>
    <script>
        (() => {
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.dataset.theme = storedTheme || (prefersDark ? 'dark' : 'light');
        })();
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="page-header">
        <h1>寶可夢食材模擬器</h1>
        <button type="button" id="theme-toggle" aria-pressed="false">深色模式</button>
    </header>
    <button id="add-btn">新增寶可夢</button>
    <div class="controls">
        <label for="search-input">依名稱搜尋: </label>
        <input type="text" id="search-input" placeholder="輸入名稱">
        <label for="search-dropdown">名稱下拉篩選: </label>
        <select id="search-dropdown">
            <option value="">-- 全部 --</option>
        </select>
        <label for="search-ing-input">依食材搜尋: </label>
        <input type="text" id="search-ing-input" placeholder="輸入食材">
        <label for="search-ing-dropdown">食材下拉篩選: </label>
        <select id="search-ing-dropdown">
            <option value="">-- 全部 --</option>
        </select>
        <label><input type="checkbox" id="ticket-checkbox" checked> 好露營券</label>
        <label for="otebo-dropdown">幫手獎勵: </label>
        <select id="otebo-dropdown">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
        </select>
    </div>
    <!-- Add Modal -->
    <div id="add-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>新增寶可夢</h2>
            <form id="add-form">
                <label>名稱
                    <input list="form-name-list" id="form-name" placeholder="輸入名稱">
                    <datalist id="form-name-list"></datalist>
                </label>
                <label>食材<select id="form-ing"></select></label>
                <label>數量<select id="form-amount"></select></label>
                <label>等級<select id="form-level">
                        <option value="30">30</option>
                        <option value="50">50</option>
                        <option value="60">60</option>
                    </select></label>
                <label>食材機率(%)<input type="number" step="0.1" id="form-ing_percent"></label>
                <label>幫忙速度<input type="number" id="form-help_speed"></label>
                <label><input type="checkbox" id="form-otebo"> 幫手獎勵</label>
                <label><input type="checkbox" id="form-spM"> 幫忙速度M</label>
                <label><input type="checkbox" id="form-spS"> 幫忙速度S</label>
                <label><input type="checkbox" id="form-ingS"> 食材機率S</label>
                <label><input type="checkbox" id="form-ingM"> 食材機率M</label>
                <label>性格<select id="form-nature">
                        <option value="">-</option>
                        <option value="sp_up">速度↑</option>
                        <option value="ing_up">食材↑</option>
                        <option value="ijippari">固執</option>
                        <option value="hikaeme">內斂</option>
                        <option value="sp_down">速度↓</option>
                        <option value="ing_down">食材↓</option>
                    </select></label>
                <button type="button" id="save-btn">儲存</button>
            </form>
        </div>
    </div>
    <table id="pokemon-table" border="1">
        <thead>
            <tr>
                <th>名稱</th>
                <th>食材</th>
                <th>數量</th>
                <th>等級</th>
                <th>幫忙速度</th>
                <th>％</th>
                <th>幫手獎勵</th>
                <th>速度M</th>
                <th>速度S</th>
                <th>食材S</th>
                <th>食材M</th>
                <th>性格</th>
                <th>平均換位次數</th>
                <th>實際幫忙速度</th>
                <th>實質幫忙速度<br>(含換位)</th>
                <th>每小時取得數量</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="pokemon-table-body"></tbody>
    </table>
    <script src="script.js" defer></script>
</body>

</html>
